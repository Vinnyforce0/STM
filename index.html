<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>STM</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg" id="bg">
    </div>
    <header class="header">
        <button class="icon-btn" onclick="createNotePage()">+</button>
        <h1 class="title">STM</h1>

        <button class="icon-btn">⚙</button>
    </header>

    <main>
    </main>
    <script type="module" src="app.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration().then(reg => {
                if (reg) {
                    reg.update(); // força buscar a versão mais recente do SW
                    console.log("Tentando atualizar o Service Worker...");
                }
            });
        }
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js', { scope: './' })
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Falha no registro do SW', err));
            });
        }
    </script>
</body>


</html>
